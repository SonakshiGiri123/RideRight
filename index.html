<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideRight | Sonakshi Giri</title>
    <style>
    body {
        background-color: #C1E7FF;
        font-family: "Arial Black", "Arial", sans-serif;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100%;
        max-width: 400px;
        text-align: center;
        padding: 10px; /* Reduced top padding */
    }

    /* Target the Title specifically to remove extra space */
    h2 { 
        font-size: 2.2rem; 
        margin-top: 10px; 
        margin-bottom: 20px; 
        text-transform: uppercase; 
    }

    /* UNIFORM BOXES: Makes everything align perfectly */
    input, select {
        width: 90%; /* Adjusted to match the button width */
        padding: 15px;
        margin: 10px 0; /* Consistent vertical spacing */
        border-radius: 12px;
        border: none;
        background-color: #E3F4FF;
        font-size: 1.1rem;
        font-weight: bold;
        box-sizing: border-box; /* Ensures padding doesn't break width */
    }

    button {
        background-color: #55B4FF; 
        color: white;
        border: none;
        border-radius: 20px;
        padding: 15px;
        font-size: 1.8rem;
        font-family: "Arial Black", sans-serif;
        width: 90%;
        margin: 20px 0 10px 0;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    #home {
        background: none;
        color: #555;
        font-size: 1.2rem;
        box-shadow: none;
        width: auto;
    }
</style>
</head>
<body>

<div class="container">
    <div id="screen3" style="display: block;">
        <h1>RideRight</h1>
        <p>Someone's waiting for you; Drive like it.</p>
        
        <div style="display: flex; align-items: center; justify-content: center;">
            <button id="BACcalculator">Blood Alcohol Content Calculator</button>
            <button id="BAC?" class="q-btn">?</button>
        </div>

        <div style="display: flex; align-items: center; justify-content: center;">
            <button id="DesignatedDriverPicker">Designated Driver Picker</button>
            <button id="driverPicker?" class="q-btn">?</button>
        </div>
        
        <p id="questionmark" style="font-size: 0.9rem; font-style: italic; color: #333; margin-top: 15px;"></p>
    </div>

    <div id="screen1" style="display: none;">
        <h2>ENTER INFORMATION</h2>
        
        <select id="sex">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        
        <select id="drinkNameDropdown">
            <option>What Were You Drinking?</option>
            <option>Light Beer</option>
            <option>Regular Beer</option>
            <option>Micro Brew</option>
            <option>White Wine</option>
            <option>Red Wine</option>
            <option>80 Proof (A Shot)</option>
            <option>Vodka</option>
            <option>Whiskey</option>
            <option>Tequila</option>
            <option>Gin</option>
            <option>Rum</option>
        </select>

        <input type="number" id="drinkNumber" placeholder="Number of Drinks?">
        <input type="number" id="ouncesDropdown" placeholder="Ounces per drink (optional)?">
        <input type="number" id="hours" placeholder="Hours since LAST drink?">
        <input type="number" id="weight" placeholder="Weight (lb)?">
        
        <select id="ageDropdown">
            <option>I'm 21+ years old.</option>
            <option>I'm under 21</option>
        </select>
        
        <button id="Go!">Generate Report</button>
        <br>
        <button id="home" style="background: none; color: #555; font-size: 1.2rem; width: auto; box-shadow: none;">Back</button>
    </div>

    <div id="screen2" style="display: none;">
        <button id="toHome" class="home-icon">🏠</button>
        <h2 style="text-align: left;">REPORT</h2>
        
        <div id="image-container" style="background: #ccc; width: 100%; height: 200px; margin-bottom: 10px;">
            <img id="image1" src="" style="width: 100%; height: 100%; object-fit: contain;">
        </div>

        <h3>Your Estimated BAC is: <span id="estimatedBAC">0.00</span></h3>
        <div id="advice">Our Recommendation:</div>
    </div>

    <div id="screen4" style="display: none;">
        <button id="home" class="home-icon">🏠</button>
        <h2>Designated Driver Picker</h2>
        <div style="display: flex;">
            <input type="text" id="text_input1" placeholder="Add a person to be part of the draw">
            <button id="add" style="width: 80px; font-size: 1rem; margin-left: 5px;">Add</button>
        </div>
        
        <h3 style="margin-top: 20px;">In the draw is....</h3>
        <p id="people"></p>
        
        <button id="Choose" style="width: 60%;">Choose!</button>
        <h3 id="label6">The designated driver is:</h3>
        <button id="restart" style="background: none; font-size: 2rem; color: black; width: 50px;">↻</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
