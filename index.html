<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideRight</title>
    <style>
        :root {
            --primary: #007AFF; 
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --text-sub: #8E8E93;
            --accent: #E5E5EA;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* --- Typography --- */
        h1 { font-size: 2.8rem; font-weight: 800; margin: 20px 0 5px 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-sub); font-weight: 600; margin-bottom: 30px; }
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); margin-bottom: 15px; }

        /* --- Cards --- */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* --- UI Elements --- */
        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn-main:active { transform: scale(0.98); }

        .btn-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-q {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            width: 55px;
            height: 55px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--accent);
            background: #FAFAFA;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .car-img { width: 100%; border-radius: 15px; margin-top: 30px; }

        #people {
            background: var(--accent);
            border-radius: 12px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
        }

        .icon-btn { background: none; border: none; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen3">
        <h1>RideRight</h1>
        <p class="subtitle">Someone's waiting for you;<br>Drive like it.</p>
        
        <div class="btn-row">
            <button id="BACcalculator" class="btn-main">BAC Calculator</button>
            <button id="BAC?" class="btn-q">?</button>
        </div>
        <div class="btn-row">
            <button id="DesignatedDriverPicker" class="btn-main">Driver Picker</button>
            <button id="driverPicker?" class="btn-q">?</button>
        </div>
        <p id="questionmark" style="font-size: 0.9rem; color: var(--text-sub);"></p>
        
        <img src="blue_car.png" class="car-img" alt="RideRight Car">
    </div>

    <div id="screen1" style="display: none;">
        <h2>Enter Information</h2>
        <div class="card">
            <select id="sex"><option>Male</option><option>Female</option></select>
            <select id="drinkNameDropdown">
                <option>Select Drink Type</option>
                <option>Light Beer</option><option>Regular Beer</option><option>Wine</option><option>Liquor/Shot</option>
            </select>
            <input type="number" id="drinkNumber" placeholder="Number of Drinks">
            <input type="number" id="hours" placeholder="Hours since last drink">
            <input type="number" id="weight" placeholder="Weight (lbs)">
            <select id="ageDropdown"><option>21+ Years Old</option><option>Under 21</option></select>
        </div>
        <button id="Go!" class="btn-main">Generate Report</button>
        <button id="home" class="icon-btn" style="font-size: 1rem; color: var(--text-sub);">← Back</button>
    </div>

    <div id="screen2" style="display: none;">
        <div style="text-align: right;"><button id="toHome" class="icon-btn">🏠</button></div>
        <h2 style="text-align: left;">Your Report</h2>
        <div class="card" style="background: var(--bg); height: 200px; display: flex; align-items: center; justify-content: center;">
             <img id="image1" src="" style="max-height: 100%; max-width: 100%; object-fit: contain;">
        </div>
        <div class="card">
            <h3 style="margin: 0; font-size: 1rem; color: var(--text-sub);">Estimated BAC</h3>
            <span id="estimatedBAC" style="font-size: 3rem; font-weight: 800; color: var(--primary);">0.00</span>
        </div>
        <div id="advice" class="card" style="text-align: left; font-size: 0.9rem;">
            <b>Recommendation:</b> Loading...
        </div>
    </div>

    <div id="screen4" style="display: none;">
        <div style="text-align: right;"><button id="toHome4" class="icon-btn">🏠</button></div>
        <h2>Driver Picker</h2>
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="text_input1" placeholder="Enter name" style="margin:0;">
                <button id="add" class="btn-main" style="width: 80px; padding: 10px; margin:0;">Add</button>
            </div>
        </div>
        <div id="people">No names yet...</div>
        <button id="Choose" class="btn-main">Random Pick!</button>
        <h3 id="label6" style="margin-top: 15px;">The driver is: <span style="color: var(--primary);">...</span></h3>
        <button id="restart" class="icon-btn">↻</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
