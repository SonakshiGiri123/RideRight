<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideRight</title>
    <style>
        body {
            background-color: #C1E7FF;
            font-family: "Arial Black", Gadget, sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 10px;
        }
        h1 { font-size: 3.5rem; margin-top: 10px; margin-bottom: 0; }
        h2 { font-size: 2.2rem; margin-top: 5px; text-transform: uppercase; }
        
        /* THE MAIN BLUE BUTTONS */
        .btn-main {
            background-color: #55B4FF;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.6rem;
            font-family: "Arial Black", sans-serif;
            width: 75%;
            margin: 10px 0;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.15);
            display: inline-block;
            vertical-align: middle;
        }

        /* THE SQUARE QUESTION MARK BUTTONS */
        .btn-q {
            background-color: #55B4FF;
            color: white;
            border: none;
            border-radius: 10px;
            width: 60px;
            height: 60px;
            font-size: 2rem;
            font-family: "Arial Black", sans-serif;
            margin-left: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.15);
            display: inline-block;
            vertical-align: middle;
        }

        /* UNIFORM FORM BOXES */
        input, select {
            width: 90%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background-color: #E3F4FF;
            font-size: 1.1rem;
            font-weight: bold;
            box-sizing: border-box;
        }

        .car-img {
            width: 95%;
            margin-top: 20px;
        }

        #home-btn {
            background: none;
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="screen3">
        <h1>RideRight</h1>
        <p style="font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">
            Someones waiting for you;<br>Drive like it.
        </p>
        
        <div style="margin-bottom: 15px;">
            <button id="BACcalculator" class="btn-main">Blood Alcohol Content Calculator</button>
            <button id="BAC?" class="btn-q">?</button>
        </div>

        <div style="margin-bottom: 15px;">
            <button id="DesignatedDriverPicker" class="btn-main">Designated Driver Picker</button>
            <button id="driverPicker?" class="btn-q">?</button>
        </div>

        <p id="questionmark" style="font-size: 0.9rem; min-height: 40px; padding: 0 20px;"></p>

        <img src="Screenshot 2026-04-21 at 10.16.17 PM.png" class="car-img" alt="Car Illustration">
    </div>

    <div id="screen1" style="display: none;">
        <h2>ENTER INFORMATION</h2>
        <select id="sex"><option>Male</option><option>Female</option></select>
        <select id="drinkNameDropdown">
            <option>What Were You Drinking?</option>
            <option>Light Beer</option><option>Regular Beer</option><option>Micro Brew</option>
            <option>White Wine</option><option>Red Wine</option><option>80 Proof (A Shot)</option>
            <option>Vodka</option><option>Whiskey</option><option>Tequila</option>
            <option>Gin</option><option>Rum</option>
        </select>
        <input type="number" id="drinkNumber" placeholder="Number of Drinks?">
        <input type="number" id="ouncesDropdown" placeholder="Ounces per drink (optional)?">
        <input type="number" id="hours" placeholder="Hours since LAST drink?">
        <input type="number" id="weight" placeholder="Weight (lb)?">
        <select id="ageDropdown">
            <option>I'm 21+ years old.</option>
            <option>I'm under 21</option>
        </select>
        <button id="Go!" class="btn-main" style="width: 95%; font-size: 2.2rem; margin-top: 20px;">Generate Report</button>
        <br>
        <button id="home" style="background:none; border:none; font-size: 1.2rem; cursor:pointer;">Back</button>
    </div>

    <div id="screen2" style="display: none;">
        <button id="toHome" id="home-btn">🏠</button>
        <h2 style="text-align: left;">REPORT</h2>
        <div style="background: #C1E7FF; width: 100%; height: 250px; margin-bottom: 15px;">
             <img id="image1" src="" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <h3 style="font-size: 1.8rem;">Your Estimated BAC is: <span id="estimatedBAC">0.00</span></h3>
        <div id="advice" style="background: #E3F4FF; padding: 15px; border-radius: 10px; text-align: left; min-height: 100px;">
            Our Recomendation:
        </div>
    </div>

    <div id="screen4" style="display: none;">
        <button id="home" id="home-btn" style="float:right; background:none; border:none; font-size: 2.5rem;">🏠</button>
        <h2>Designated Driver Picker</h2>
        <div style="display: flex; gap: 5px; justify-content: center;">
            <input type="text" id="text_input1" placeholder="Add a person to be part of the draw" style="width: 70%;">
            <button id="add" class="btn-main" style="width: 20%; font-size: 1.1rem; margin: 8px 0; padding: 10px;">Add</button>
        </div>
        <h2 style="margin-top: 20px;">In the draw is....</h2>
        <p id="people" style="font-size: 1.2rem; font-weight: bold;"></p>
        <button id="Choose" class="btn-main" style="width: 50%;">Choose!</button>
        <h3 id="label6" style="margin-top: 15px;">The designated driver is:</h3>
        <button id="restart" style="background:none; border:none; font-size: 3rem; cursor:pointer;">↻</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
