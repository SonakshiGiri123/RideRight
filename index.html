<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideRight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF; 
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --text-sub: #8E8E93;
            --accent: #E5E5EA;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 2.8rem; font-weight: 800; margin: 20px 0 5px 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-sub); font-weight: 600; margin-bottom: 30px; }
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); margin-bottom: 15px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }

        .icon-btn { background: none; border: none; font-size: 1.4rem; color: #000; cursor: pointer; padding: 10px; }

        .header-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            width: 100%;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--accent);
            background: #FAFAFA;
            font-size: 1rem;
            box-sizing: border-box;
        }

        #people {
            background: var(--accent);
            border-radius: 12px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen3">
        <h1>RideRight</h1>
        <p class="subtitle">Someone's waiting for you;<br>Drive like it.</p>
        <button id="BACcalculator" class="btn-main">BAC Calculator</button>
        <button id="toVision" class="btn-main" style="background: #1C1C1E;">VisionScan AI</button>
        <button id="DesignatedDriverPicker" class="btn-main" style="background:#E5E5EA; color:#000;">Driver Picker</button>
        <img src="blue_car.png" style="width:100%; border-radius:15px; margin-top:30px;">
    </div>

    <div id="screen1" style="display: none;">
        <div style="text-align: left;"><button id="home" class="icon-btn">← Back</button></div>
        <h2>Profile Details</h2>
        <div class="card">
            <select id="sex"><option>Female</option><option>Male</option></select>
            <input type="number" id="weight" placeholder="Weight (lbs)">
            <select id="ageDropdown"><option>21+ Years Old</option><option>Under 21</option></select>
        </div>
        <h2>Current Session</h2>
        <div class="card">
            <select id="drinkNameDropdown"><option>Regular Beer</option><option>Wine</option><option>Liquor</option></select>
            <input type="number" id="drinkNumber" placeholder="Number of Drinks">
            <input type="number" id="hours" placeholder="Hours since last drink">
        </div>
        <button id="Go!" class="btn-main">Generate Report</button>
    </div>

    <div id="screen2" style="display: none;">
        <div class="header-controls">
            <button id="toHome" class="icon-btn"><i class="fas fa-home"></i></button>
        </div>
        <div class="card" style="height: 180px; display: flex; align-items: center; justify-content: center;">
             <img id="image1" src="" style="max-height: 100%; object-fit: contain;">
        </div>
        <div class="card">
            <h3 style="margin: 0; color: var(--text-sub);">Estimated BAC</h3>
            <span id="estimatedBAC" style="font-size: 3.5rem; font-weight: 800; color: var(--primary);">0.00</span>
        </div>
        <div id="advice" class="card" style="text-align: left; font-size: 0.95rem; line-height: 1.5;"></div>
    </div>

    <div id="screen4" style="display: none;">
        <div class="header-controls">
            <button id="restart" class="icon-btn"><i class="fas fa-redo"></i></button>
            <button id="toHome4" class="icon-btn"><i class="fas fa-home"></i></button>
        </div>
        <h2>Driver Picker</h2>
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="text_input1" placeholder="Add name" style="margin:0;">
                <button id="add" class="btn-main" style="width: 80px; padding: 10px; margin:0;">Add</button>
            </div>
        </div>
        <div id="people">No names yet...</div>
        <button id="Choose" class="btn-main">Random Pick!</button>
        <h3 id="label6" style="margin-top: 20px;">The driver is: <span id="driverName" style="color: var(--primary);">...</span></h3>
    </div>

    <div id="screen5" style="display: none;">
        <div class="header-controls">
            <button id="toHome5" class="icon-btn"><i class="fas fa-home"></i></button>
        </div>
        <h2>VisionScan AI</h2>
        <p class="subtitle">Focus on the center</p>
        <div class="card" style="background: #000; height: 300px; position: relative; overflow: hidden; border: 1px solid #3A3A3C;">
            <div id="eyeDot" style="width: 24px; height: 24px; background: #007AFF; border-radius: 50%; position: absolute; top: 50%; left: 45%; display: none; box-shadow: 0 0 20px rgba(0,122,255,0.8);"></div>
            <div id="scanOverlay" style="color: #FFFFFF; padding-top: 80px;">
                <i class="fas fa-eye" style="font-size: 3rem; margin-bottom: 15px; color: #007AFF;"></i>
                <p id="scanStatus" style="font-weight: 600;">Ready for Stability Test?</p>
                <button id="startScan" class="btn-main" style="width: 70%; margin-top: 20px;">Start Calibration</button>
            </div>
        </div>
