<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideRight</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            background-color: #C1E7FF;
            font-family: "Arial Black", Gadget, sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            color: #000;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 10px;
        }
        h1 { font-size: 3.5rem; margin-top: 10px; margin-bottom: 0; }
        h2 { font-size: 2.2rem; margin-top: 5px; text-transform: uppercase; }

        /* --- BUTTON STYLES --- */
        .btn-main {
            background-color: #55B4FF;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.6rem;
            font-family: "Arial Black", sans-serif;
            width: 75%;
            margin: 10px 0;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.15);
            display: inline-block;
            vertical-align: middle;
        }

        .btn-q {
            background-color: #55B4FF;
            color: white;
            border: none;
            border-radius: 10px;
            width: 60px;
            height: 60px;
            font-size: 2rem;
            margin-left: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.15);
            display: inline-block;
            vertical-align: middle;
        }

        /* --- FORM STYLES (Screen 1) --- */
        input, select {
            width: 90%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background-color: #E3F4FF;
            font-size: 1.1rem;
            font-weight: bold;
            box-sizing: border-box; /* Makes them perfectly uniform */
        }

        /* --- DRIVER PICKER LIST (Screen 4) --- */
        #people {
            font-size: 1.2rem;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin: 10px auto;
            width: 80%;
            max-height: 150px;
            overflow-y: auto; /* Adds scrollbar if list is long */
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 90%;
            margin: 0 auto;
        }

        /* --- REPORT SCREEN --- */
        #image-container {
            background-color: #C1E7FF; /* Matches the blue so grey bars vanish */
            width: 100%;
            height: 250px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen3">
        <h1>RideRight</h1>
        <p style="font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;">
            Someones waiting for you;<br>Drive like it.
        </p>
        <div>
            <button id="BACcalculator" class="btn-main">Blood Alcohol Content Calculator</button>
            <button id="BAC?" class="btn-q">?</button>
        </div>
        <div>
            <button id="DesignatedDriverPicker" class="btn-main">Designated Driver Picker</button>
            <button id="driverPicker?" class="btn-q">?</button>
        </div>
        <p id="questionmark" style="font-size: 0.9rem; min-height: 40px; padding: 0 20px;"></p>
        
        <img src="blue_car.png" style="width: 95%; margin-top: 20px;" alt="Car">
    </div>

    <div id="screen1" style="display: none;">
        <h2>ENTER INFORMATION</h2>
        <select id="sex"><option>Male</option><option>Female</option></select>
        <select id="drinkNameDropdown">
            <option>What Were You Drinking?</option>
            <option>Light Beer</option><option>Regular Beer</option><option>Micro Brew</option>
            <option>White Wine</option><option>Red Wine</option><option>80 Proof (A Shot)</option>
            <option>Vodka</option><option>Whiskey</option><option>Tequila</option>
            <option>Gin</option><option>Rum</option>
        </select>
        <input type="number" id="drinkNumber" placeholder="Number of Drinks?">
        <input type="number" id="ouncesDropdown" placeholder="Ounces per drink (optional)?">
        <input type="number" id="hours" placeholder="Hours since LAST drink?">
        <input type="number" id="weight" placeholder="Weight (lb)?">
        <select id="ageDropdown">
            <option>I'm 21+ years old.</option>
            <option>I'm under 21</option>
        </select>
        <button id="Go!" class="btn-main" style="width: 90%; font-size: 2rem;">Generate Report</button>
        <br>
        <button id="home" style="background:none; border:none; font-size: 1.2rem; cursor:pointer;">Back</button>
    </div>

    <div id="screen2" style="display: none;">
        <div style="width: 100%; text-align: right;">
            <button id="toHome" style="background:none; border:none; font-size: 2.5rem; cursor:pointer;">🏠</button>
        </div>
        <h2 style="text-align: left;">REPORT</h2>
        <div id="image-container">
             <img id="image1" src="" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <h3 style="font-size: 1.8rem;">Your Estimated BAC is: <span id="estimatedBAC">0.00</span></h3>
        <div id="advice" style="background: #E3F4FF; padding: 15px; border-radius: 10px; text-align: left; min-height: 100px;">
            Our Recommendation:
        </div>
    </div>

    <div id="screen4" style="display: none;">
        <div style="width: 100%; text-align: right;">
            <button id="toHome4" style="background:none; border:none; font-size: 2.5rem; cursor:pointer;">🏠</button>
        </div>
        <h2>DESIGNATED DRIVER PICKER</h2>
        <div class="input-group">
            <input type="text" id="text_input1" placeholder="Name..." style="width: 60%; margin: 0;">
            <button id="add" class="btn-main" style="width: 25%; font-size: 1.1rem; padding: 10px; margin: 0;">Add</button>
        </div>
        <h2 style="margin-top: 20px;">IN THE DRAW IS....</h2>
        <div id="people">No names added yet</div>
        <button id="Choose" class="btn-main" style="width: 60%;">Choose!</button>
        <h3 id="label6">The designated driver is:</h3>
        <button id="restart" style="background:none; border:none; font-size: 3rem; cursor:pointer;">↻</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
